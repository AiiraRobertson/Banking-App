$kind: http-request
url: "{{baseUrl}}/api/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": { "$ne": null },
      "password": { "$ne": null }
    }
scripts:
  - type: afterResponse
    code: pm.test('rejected (400/401)', () => pm.expect([400,401]).to.include(pm.response.code));
    language: text/javascript
order: 4000
