$kind: http-request
name: SEC-DATA-01b password_hash never serialised — /profile
url: "{{baseUrl}}/api/profile"
method: GET
headers:
  Authorization: Bearer {{userToken}}
scripts:
  - type: afterResponse
    code: |-
      pm.test('no password_hash', () => {
        pm.expect(pm.response.text()).to.not.match(/password_hash/i);
      });
    language: text/javascript
order: 2000
