$kind: http-request
name: SEC-DATA-01 password_hash never serialised — /me
url: "{{baseUrl}}/api/auth/me"
method: GET
headers:
  Authorization: Bearer {{userToken}}
scripts:
  - type: afterResponse
    code: |-
      pm.test('200 + no password_hash', () => {
        pm.response.to.have.status(200);
        pm.expect(pm.response.text()).to.not.match(/password_hash/i);
        pm.expect(pm.response.text()).to.not.match(/\$2[abxy]\$/);
      });
    language: text/javascript
order: 1000
