$kind: http-request
url: "{{baseUrl}}/api/accounts"
method: GET
headers:
  Origin: http://localhost:5173
scripts:
  - type: afterResponse
    code: |-
      const acao = pm.response.headers.get('Access-Control-Allow-Origin');
      const acac = pm.response.headers.get('Access-Control-Allow-Credentials');
      pm.test('not (\'*\' AND credentials:true)', () => {
        pm.expect(!(acao === '*' && (acac || '').toLowerCase() === 'true')).to.be.true;
      });
    language: text/javascript
order: 3000
