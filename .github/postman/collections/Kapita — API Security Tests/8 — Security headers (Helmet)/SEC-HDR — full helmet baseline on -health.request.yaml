$kind: http-request
name: SEC-HDR — full helmet baseline on /health
url: "{{baseUrl}}/health"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('CSP present', () => pm.expect(pm.response.headers.get('Content-Security-Policy')).to.be.a('string'));
      pm.test('X-Content-Type-Options nosniff', () => pm.expect((pm.response.headers.get('X-Content-Type-Options')||'').toLowerCase()).to.equal('nosniff'));
      pm.test('X-Frame-Options set', () => pm.expect(pm.response.headers.get('X-Frame-Options')).to.match(/SAMEORIGIN|DENY/i));
      pm.test('Referrer-Policy set', () => pm.expect(pm.response.headers.get('Referrer-Policy')).to.be.a('string'));
      pm.test('Rate-limit headers present', () => {
        const h = pm.response.headers.get('RateLimit-Limit') || pm.response.headers.get('X-RateLimit-Limit');
        pm.expect(h).to.be.a('string');
      });
      pm.test('X-Powered-By absent', () => pm.expect(pm.response.headers.get('X-Powered-By')).to.be.null);
    language: text/javascript
order: 1000
