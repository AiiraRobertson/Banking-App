$kind: http-request
url: "{{baseUrl}}/api/transactions/transfer"
method: POST
headers:
  Authorization: Bearer {{userToken}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "from_account_id": {{userAcctId}},
      "to_account_id": {{userSavingsId}},
      "amount": -50
    }
scripts:
  - type: afterResponse
    code: pm.test('400', () => pm.response.to.have.status(400));
    language: text/javascript
order: 3000
