$kind: http-request
url: "{{baseUrl}}/api/transactions/deposit"
method: POST
headers:
  Authorization: Bearer {{userToken}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "account_id": {{userAcctId}},
      "amount": -100,
      "description": "neg deposit"
    }
scripts:
  - type: afterResponse
    code: pm.test('400', () => pm.response.to.have.status(400));
    language: text/javascript
order: 1000
