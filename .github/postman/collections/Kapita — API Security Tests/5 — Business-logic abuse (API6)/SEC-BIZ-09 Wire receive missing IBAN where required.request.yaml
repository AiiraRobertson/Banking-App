$kind: http-request
url: "{{baseUrl}}/api/wire/receive"
method: POST
headers:
  Authorization: Bearer {{userToken}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "to_account_id": {{userAcctId}},
      "amount": 100,
      "country_code": "GB",
      "sender_name": "Probe",
      "sender_bank": "Barclays",
      "swift_code": "BARCGB22"
    }
scripts:
  - type: afterResponse
    code: pm.test('400 — IBAN required for GB', () => pm.response.to.have.status(400));
    language: text/javascript
order: 7000
