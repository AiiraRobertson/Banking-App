$kind: http-request
url: "{{baseUrl}}/api/admin/stats"
method: GET
headers:
  Authorization: Bearer {{tamperedToken}}
scripts:
  - type: beforeRequest
    code: |-
      const t = pm.collectionVariables.get('userToken') || '';
      const parts = t.split('.');
      if (parts.length === 3) {
        const payload = JSON.parse(Buffer.from(parts[1].replace(/-/g,'+').replace(/_/g,'/'), 'base64').toString());
        payload.role = 'admin';
        const tampered = parts[0] + '.' + Buffer.from(JSON.stringify(payload)).toString('base64').replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_') + '.' + parts[2];
        pm.variables.set('tamperedToken', tampered);
      }
    language: text/javascript
  - type: afterResponse
    code: pm.test('401 — signature invalid after payload edit', () => pm.response.to.have.status(401));
    language: text/javascript
order: 5000
