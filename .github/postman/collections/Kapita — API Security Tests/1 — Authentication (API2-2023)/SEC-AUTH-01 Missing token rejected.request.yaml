$kind: http-request
url: "{{baseUrl}}/api/accounts"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('401 Authentication required', () => {
        pm.response.to.have.status(401);
        pm.expect(pm.response.json().error).to.match(/auth/i);
      });
    language: text/javascript
order: 1000
